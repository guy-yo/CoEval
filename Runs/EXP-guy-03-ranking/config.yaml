experiment:
  generation_retries: 1
  id: EXP-guy-03-ranking
  log_level: INFO
  probe_mode: disable
  storage_folder: ./Runs
models:
- interface: openrouter
  name: gpt-oss-20b-teacher
  parameters:
    max_tokens: 512
    model: openai/gpt-oss-20b:free
    temperature: 0.8
  roles:
  - teacher
- interface: openrouter
  name: lfm-1.2b
  parameters:
    max_tokens: 16
    model: liquid/lfm-2.5-1.2b-instruct:free
    temperature: 0.3
  roles:
  - student
- interface: openrouter
  name: gemma-4-26b
  parameters:
    max_tokens: 16
    model: google/gemma-4-26b-a4b-it:free
    temperature: 0.3
  roles:
  - student
- interface: openrouter
  name: gpt-oss-120b
  parameters:
    max_tokens: 16
    model: openai/gpt-oss-120b:free
    temperature: 0.3
  roles:
  - student
- interface: metric
  name: exact-match
  parameters:
    metric: exact_match
  roles:
  - judge
tasks:
- description: 'Classify an email as Phishing, Suspicious, or Legitimate based on
    its content and characteristics.

    '
  evaluation_mode: single
  name: phishing_detection
  nuanced_attributes:
    context:
    - account_issue
    - prize_winner
    tone:
    - threatening
    - friendly
  output_description: 'A single word -- one of: Phishing, Suspicious, or Legitimate.
    No other text.

    '
  prompt_library:
    sample: "Generate a benchmark data point for email phishing detection.\nTask:\
      \ {task_description}\nResponse format: {output_description}\nRequired attributes:\
      \ {target_attributes}. Nuance: {nuanced_attributes}.\n\nFollow this example\
      \ format exactly:\n{{\"prompt\": \"Dear valued customer, your account has been\
      \ suspended due to unusual activity. Click here to restore access: http://secure-banklogin.xyz/verify\"\
      ,\n  \"response\": \"Phishing\"}}\n\nNow generate a NEW, different email that\
      \ matches the required attributes.\nReturn only a JSON object with keys \"prompt\"\
      \ and \"response\". No explanation.\n"
  rubric:
    classification:
      description: 'The student correctly classified the email as Phishing, Suspicious,
        or Legitimate.

        '
      metric: exact_match
  sampling:
    nuance:
    - 1
    - 1
    target: all
    total: 12
  target_attributes:
    label:
    - Phishing
    - Suspicious
    - Legitimate
    quality:
    - professional
    - typos
    sender_type:
    - bank
    - unknown

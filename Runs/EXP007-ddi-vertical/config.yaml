tasks:
- name: drug_interaction_reasoning
  description: 'a drug-drug interaction clinical-reasoning question: given two or more co-administered drugs and a patient
    context, identify the interaction, its mechanism and severity, and the correct clinical action.'
  output_description: 'A concise, clinically correct answer (2-5 sentences): the interaction, its mechanism (pharmacokinetic/pharmacodynamic)
    and severity, and the safe clinical recommendation.'
  target_attributes:
    interaction_severity:
    - contraindicated
    - major
    - moderate
    - minor
    mechanism:
    - pharmacokinetic
    - pharmacodynamic
    patient_context:
    - renal_impairment
    - hepatic_impairment
    - polypharmacy_elderly
    - pregnancy
  nuanced_attributes: {}
  sampling:
    target:
    - 1
    nuance:
    - 0
    total: 50
  rubric:
    interaction_accuracy: The interaction and its mechanism are correctly identified.
    severity_correct: The severity/risk level is correctly characterized.
    safety: The recommended clinical action is safe and avoids harmful/contraindicated advice.
    completeness: The answer addresses interaction, mechanism, severity, and action.
  evaluation_mode: single
  prompt_library:
    sample: 'Generate a realistic, challenging benchmark data point for: {task_description}

      Output format for the model under test: {output_description}

      Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

      Return ONLY a JSON object with keys "prompt" (the question/scenario posed to the model) and "response" (an expert, correct
      reference answer). Make the prompt specific and domain-authentic; do not copy any existing published item.

      Example: {{"prompt": "...", "response": "..."}}'
    test: 'You are answering a {task_description}

      Output: {output_description}


      {input}


      Respond with only the answer.'
experiment:
  id: EXP007-ddi-vertical
  storage_folder: ./Runs
  log_level: INFO
  generation_retries: 2
  phases:
    attribute_mapping: New
    rubric_mapping: New
    data_generation: New
    response_collection: New
    evaluation: New
  quota:
    gpt-4o-mini:
      max_calls: 4000
    gpt-3.5-turbo:
      max_calls: 4000
    llama-3.2-3b:
      max_calls: 4000
    claude-haiku:
      max_calls: 4000
    gemini-flash:
      max_calls: 4000

# =============================================================================
# CoEval -- Cybersecurity / Phishing Detection
# RUN 02: the FIX  (sampling.target = all -> full cartesian coverage)
# =============================================================================
# Same task/models/judge as the buggy run (EXP-guy-01c) -- ONLY the sampling
# is changed, so the before/after is a clean controlled comparison.
#
# THE FIX: sampling.target = all  ->  phase3.py:236 takes the _make_target_cycle
# branch, which cycles the full Cartesian product of the target attributes.
# With total = 12 = |3 x 2 x 2|, every one of the 12 (label, sender_type,
# quality) combinations is produced exactly once. Every email now has a
# controlled `label` ground-truth, and diversity is maximal.
#
# All models via OpenRouter :free  ->  $0.  ~12 teacher + 3x12 student = 48 calls.
# Run with:  COEVAL_MAX_WORKERS=2 python -m runner.cli run --config Runs/_guy_configs/02_fixed.yaml
# =============================================================================

models:

  # ---- TEACHER: FREE model that stayed responsive (good JSON) ---------------
  - name: gpt-oss-20b-teacher
    interface: openrouter
    parameters:
      model: openai/gpt-oss-20b:free
      temperature: 0.8
      max_tokens: 512
    roles: [teacher]

  # ---- STUDENTS: same set as the buggy run (focus is on generation) --------
  - name: lfm-1.2b
    interface: openrouter
    parameters:
      model: liquid/lfm-2.5-1.2b-instruct:free
      temperature: 0.3
      max_tokens: 16
    roles: [student]

  - name: nemotron-9b
    interface: openrouter
    parameters:
      model: nvidia/nemotron-nano-9b-v2:free
      temperature: 0.3
      max_tokens: 16
    roles: [student]

  - name: glm-4.5-air
    interface: openrouter
    parameters:
      model: z-ai/glm-4.5-air:free
      temperature: 0.3
      max_tokens: 16
    roles: [student]

  # ---- JUDGE: deterministic metric, 0 LLM calls, no API key ----------------
  - name: exact-match
    interface: metric
    parameters:
      metric: exact_match
    roles: [judge]


tasks:
  - name: phishing_detection
    description: >
      Classify an email as Phishing, Suspicious, or Legitimate
      based on its content and characteristics.
    output_description: >
      A single word -- one of: Phishing, Suspicious, or Legitimate. No other text.

    target_attributes:
      label:        [Phishing, Suspicious, Legitimate]
      sender_type:  [bank, unknown]
      quality:      [professional, typos]

    nuanced_attributes:
      tone:    [threatening, friendly]
      context: [account_issue, prize_winner]

    sampling:
      target: all         # <-- FIX: full Cartesian coverage of all 12 combos
      nuance: [1, 1]
      total: 12           # = |label| x |sender_type| x |quality| = 3 x 2 x 2

    rubric:
      classification:
        metric: exact_match
        description: >
          The student correctly classified the email as
          Phishing, Suspicious, or Legitimate.

    evaluation_mode: single

    prompt_library:
      sample: |
        Generate a benchmark data point for email phishing detection.
        Task: {task_description}
        Response format: {output_description}
        Required attributes: {target_attributes}. Nuance: {nuanced_attributes}.

        Follow this example format exactly:
        {{"prompt": "Dear valued customer, your account has been suspended due to unusual activity. Click here to restore access: http://secure-banklogin.xyz/verify",
          "response": "Phishing"}}

        Now generate a NEW, different email that matches the required attributes.
        Return only a JSON object with keys "prompt" and "response". No explanation.


experiment:
  id: "EXP-guy-02-phishing-fixed"
  storage_folder: "./Runs"
  log_level: INFO
